<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas sencillas en HTML</title>
</head>
<body>
    <table border="1">
        <tr>
            <td>Producto</td>
            <td>Precio</td>
            <td>Marca</td>
            <td>Características</td>
        </tr>
        <tr>
            <td>Tostador</td>
            <td>Antes: <del>1200€</del> <br>
            Ahora: 999€</td>
            <td>Kisuki</td>
            <td>Capacidad de 4 rebanadas</td>
        </tr>
        <tr>
            <td>Plancha</td>
            <td>Antes: <del>659€</del> <br>
            Ahora: 499€</td>
            <td>Matsuma</td>
            <td>7 niveles de calor</td>
        </tr>
        <tr>
            <td>Licuadora</td>
            <td>Antes: <del>799€</del> <br>
            Ahora: 539€</td>
            <td>Motiki</td>
            <td>5 velocidades <br>
            Vaso con capacidad de 2 litros</td>
        </tr>
    </table>
</body>
</html>
