    <h3><b>Ejemplo de uso &lt;BLOCKOUTE&gt; </b></h3>
    <pre>Mi poema favorito es aquel de Federico García Lorca que reza: </pre>
    <blockquote><pre>Mi corazón, como una sierpe
se ha desprendido de su piel
y aquí la miro entre mis dedos
llena de heridas y de miel
    </pre></blockquote>
