<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

<body>
    <form method="get" action="insertar_cv.html">
    <fieldset>
        <legend>Rellenar</legend>
        
        <select name="sexo" id="sexo">
            <option value="hombre" name="sexo">Hombre</option>
            <option value="mujer" name="sexo">Mujer</option>
        </select>
        <br>
        Elija un color: <input type="color" name="color" id="color" value="color">
        <br>
        Elija una fecha: <input type="date" name="fecha" id="fecha" value="fecha">
        <br>
        <input type="radio" name="lenguaje" value="lenguajejava" id="java">Java
        <input type="radio" name="lenguaje" value="lenguajepython" id="python">Python
        <input type="radio" name="lenguaje" value="lenguajeHTML" id="html">HTML
        <input type="radio" name="lenguaje" value="lenguajeVisualbasic" id="visualbasic">Visual basic
        <input type="radio" name="programacion" value="css" id="css">CSS
        <br>
        <input type="checkbox" name="sexo" value="sexohombre" id="hombre">Hombre
        <input type="checkbox" name="sexo" value="sexomujer" id="mujer">Mujer
        <br>
        Elija un fichero: <input type="file" name="fichero" value="fichero" id="fichero">
        <br>
        <textarea name="textarea" id="textarea" cols="60" rows="10" placeholder="Por favor, escriba aquí"></textarea>
        <br>
        Instituto<input type="text" name="instituto" value="" id="instituto">
        <br>
        Estudios elegidos<input type="text" name="estudios" value="" id="estudios">
        <br>
        Nombre<input type="text" name="nombre" value="" id="nombre">
        <br>
        Apellidos<input type="text" name="apellidos" value="" id="apellidos">
        <br>
        Email<input type="text" name="email" value="" id="email">
        <br><br>
    </fieldset>
    <fieldset>
        <legend>Rellene las opciones siguientes</legend>
            <input type="checkbox" name="so" value="sisetmawindows" id="win">Windows
            <input type="checkbox" name="sistema" value="sistemamac" id="mac">Mac
            <input type="checkbox" name="sistema" value="sistemalinux" id="linux">Linux
            <br>
            Elija una hora:<input type="time" name="hora" value="hora" id="hora">
            <br>
            <input type="checkbox" name="procesador" value="procesadoramd" id="amd">AMD
            <input type="checkbox" name="procesador" value="procesadorintel_i5" id="i5">Intel i5
            <input type="checkbox" name="procesador" value="procesadorintel_i7" id="i7">Intel i7
            <br>
        Elija un fichero:<input type="file" name="fichero" value="fichero" id="archivo">
    </fieldset>
    <br><br><br>
    <input type="submit" id="envio" name="envio" value="Enviar Formulario">
    <input type="reset" value="Borrar los datos introducidos">
